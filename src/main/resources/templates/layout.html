<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (content, pageTitle)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Smbox - Brainstorm'">Smbox</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        serif: ['Merriweather', 'ui-serif', 'Georgia'],
                    },
                }
            }
        }
    </script>
    <style>
        .prose-content { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 font-sans text-gray-900 antialiased">
    <div class="md:flex">
        <!-- Sidebar -->
        <aside class="w-full border-b border-gray-200 bg-white md:fixed md:inset-y-0 md:flex md:w-64 md:flex-col md:border-b-0 md:border-r">
            <div class="flex items-center gap-2 border-b border-gray-200 px-6 py-5">
                <i class="fas fa-book-open text-indigo-600"></i>
                <a th:href="@{/posts}" class="font-serif text-lg font-bold tracking-tight text-gray-900">Smbox</a>
            </div>
            <nav class="flex-1 overflow-y-auto px-4 py-6 md:space-y-8">
                <div>
                    <h3 class="mb-2 px-2 text-xs font-semibold uppercase tracking-wider text-gray-400">Categories</h3>
                    <ul class="space-y-1">
                        <li th:each="category : ${sidebarCategories}">
                            <a th:href="@{/posts(category=${category.id})}" th:text="${category.name}"
                               class="block truncate rounded-md px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 hover:text-gray-900"
                               th:classappend="${selectedCategory != null and selectedCategory.equals(category.id)} ? 'bg-indigo-600 text-white hover:bg-indigo-600 hover:text-white font-medium' : ''">Category</a>
                        </li>
                    </ul>
                    <p th:if="${#lists.isEmpty(sidebarCategories)}" class="px-3 text-sm text-gray-400">No categories yet.</p>
                </div>
                <div class="mt-6 border-t border-gray-100 pt-6 md:mt-0 md:border-t-0 md:pt-0">
                    <h3 class="mb-2 px-2 text-xs font-semibold uppercase tracking-wider text-gray-400">Add New</h3>
                    <ul class="space-y-1">
                        <li>
                            <a th:href="@{/add}" class="flex items-center gap-2 rounded-md px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 hover:text-gray-900">
                                <i class="fas fa-plus w-3.5 text-xs"></i>Add a new post
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/categories/add}" class="flex items-center gap-2 rounded-md px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 hover:text-gray-900">
                                <i class="fas fa-plus w-3.5 text-xs"></i>Add a new category
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex min-h-screen flex-1 flex-col md:pl-64">
            <main class="mx-auto w-full max-w-3xl flex-1 px-4 py-10 sm:px-6 lg:px-8">
                <div th:replace="${content}">Content goes here</div>
            </main>
            <footer class="border-t border-gray-200 bg-white py-6 text-center text-sm text-gray-400">
                Smbox &mdash; A place for your thoughts
            </footer>
        </div>
    </div>
</body>
</html>
