<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Categories - Brainstorm')}">
<body>
<div th:fragment="content">
    <div class="mb-6 flex items-center justify-between">
        <div>
            <h1 class="font-serif text-4xl font-bold tracking-tight text-gray-900">Categories</h1>
            <p class="mt-1 text-sm font-medium text-gray-500" th:text="${#lists.size(categories)} + ' ' + (${#lists.size(categories)} == 1 ? 'category' : 'categories')">0 categories</p>
        </div>
        <a th:href="@{/categories/add}" class="inline-flex items-center gap-2 rounded-md bg-emerald-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-emerald-500">
            <i class="fas fa-plus"></i>New Category
        </a>
    </div>

    <hr class="mb-6 border-gray-200">

    <div th:if="${#lists.isEmpty(categories)}" class="py-16 text-center">
        <i class="fas fa-tags mb-4 text-5xl text-gray-300"></i>
        <h3 class="mb-2 font-serif text-lg font-semibold text-gray-500">No categories yet</h3>
        <p class="mb-6 text-gray-500">Create your first category to start organizing your posts.</p>
        <a th:href="@{/categories/add}" class="inline-flex items-center gap-2 rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-indigo-500">
            <i class="fas fa-plus"></i>Create Your First Category
        </a>
    </div>

    <div th:if="${!#lists.isEmpty(categories)}" class="space-y-4">
        <article class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm transition hover:shadow-md" th:each="category : ${categories}">
            <h2 class="font-serif text-xl font-bold leading-snug text-gray-900">
                <a th:href="@{/categories/{id}(id=${category.id})}" th:text="${category.name}" class="hover:text-indigo-600">Category Name</a>
            </h2>
            <div th:if="${#strings.length(category.description) > 0}" class="mt-3 text-sm leading-relaxed text-gray-600">
                <span th:text="${category.description}"></span>
            </div>
            <div class="mt-4 flex items-center justify-between">
                <a th:href="@{/categories/{id}(id=${category.id})}" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
                    View details &rarr;
                </a>
                <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="inline-flex items-center gap-1.5 rounded-md border border-gray-300 px-2.5 py-1.5 text-xs font-medium text-gray-700 transition hover:bg-gray-50">
                    <i class="fas fa-edit"></i>Edit
                </a>
            </div>
        </article>
    </div>
</div>
</body>
</html>
