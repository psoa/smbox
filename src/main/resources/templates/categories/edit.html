<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, #{category.edit.page.title})}">
<body>
<div th:fragment="content">
    <h1 class="mb-6 font-serif text-3xl font-bold tracking-tight text-gray-900" th:text="#{category.edit.heading}">Edit Category</h1>

    <form th:action="@{/categories/edit}" th:object="${category}" method="post" class="space-y-6">
        <input type="hidden" th:field="*{id}" />

        <div>
            <label for="name" class="mb-1.5 block text-sm font-semibold text-gray-700" th:text="#{field.name}">Name</label>
            <input type="text" id="name" th:field="*{name}" th:placeholder="#{field.name.placeholder}" required
                class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
        </div>

        <div>
            <label for="description" class="mb-1.5 block text-sm font-semibold text-gray-700" th:text="#{field.description}">Description</label>
            <textarea id="description" th:field="*{description}" rows="4" th:placeholder="#{field.description.placeholder}"
                class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
        </div>

        <hr class="border-gray-200">

        <div class="flex items-center justify-between pt-2">
            <a th:href="@{/categories}" class="text-sm font-medium text-gray-600 hover:text-gray-900" th:text="#{action.cancel}">
                Cancel
            </a>
            <div class="flex gap-2">
                <a th:href="@{/categories/{id}(id=${category.id})}" class="inline-flex items-center gap-1.5 rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-50">
                    <i class="fas fa-eye"></i><span th:text="#{action.preview}">Preview</span>
                </a>
                <button type="submit" class="inline-flex items-center gap-2 rounded-md bg-emerald-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-emerald-500">
                    <i class="fas fa-check"></i><span th:text="#{action.update}">Update</span>
                </button>
            </div>
        </div>
    </form>
</div>
</body>
</html>
