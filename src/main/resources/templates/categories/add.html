<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'New Category')}">

<body>
    <div th:fragment="content">
        <h1 class="page-title text-start mb-4">New Category</h1>

        <form th:action="@{/categories/add}" th:object="${category}" method="post">
            <div class="mb-4">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" th:field="*{name}"
                    placeholder="Category name" required>
            </div>

            <div class="mb-4">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="4"
                    placeholder="Describe this category..."></textarea>
            </div>

            <div class="divider"></div>

            <div class="d-flex justify-content-between align-items-center pt-3">
                <a th:href="@{/categories}" class="btn btn-outline-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check me-2"></i>Save
                </button>
            </div>
        </form>
    </div>
</body>

</html>
