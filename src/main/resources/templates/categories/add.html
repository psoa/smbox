<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'New Category')}">

<body>
    <div th:fragment="content">
        <h1 class="mb-6 font-serif text-3xl font-bold tracking-tight text-gray-900">New Category</h1>

        <form th:action="@{/categories/add}" th:object="${category}" method="post" class="space-y-6">
            <div>
                <label for="name" class="mb-1.5 block text-sm font-semibold text-gray-700">Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Category name" required
                    class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>

            <div>
                <label for="description" class="mb-1.5 block text-sm font-semibold text-gray-700">Description</label>
                <textarea id="description" th:field="*{description}" rows="4" placeholder="Describe this category..."
                    class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
            </div>

            <hr class="border-gray-200">

            <div class="flex items-center justify-between pt-2">
                <a th:href="@{/categories}" class="text-sm font-medium text-gray-600 hover:text-gray-900">
                    Cancel
                </a>
                <button type="submit" class="inline-flex items-center gap-2 rounded-md bg-emerald-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-emerald-500">
                    <i class="fas fa-check"></i>Save
                </button>
            </div>
        </form>
    </div>
</body>

</html>
