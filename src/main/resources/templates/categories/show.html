<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, #{category.show.page.title})}">
<body>
<div th:fragment="content">
    <article>
        <header class="mb-6">
            <h1 class="font-serif text-3xl font-bold tracking-tight text-gray-900" th:text="${category.name}">Category Name</h1>
        </header>

        <hr class="mb-6 border-gray-200">

        <div class="prose-content font-serif text-lg leading-relaxed text-gray-800" th:text="${category.description}">
            Category description will appear here...
        </div>

        <hr class="my-6 border-gray-200">

        <footer class="flex items-center justify-between pt-2">
            <a th:href="@{/categories}" class="inline-flex items-center gap-2 text-sm font-medium text-gray-600 hover:text-gray-900">
                <i class="fas fa-arrow-left"></i><span th:text="#{action.back.categories}">Back to categories</span>
            </a>
            <div class="flex gap-2">
                <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="inline-flex items-center gap-1.5 rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-50">
                    <i class="fas fa-edit"></i><span th:text="#{action.edit}">Edit</span>
                </a>
                <a th:href="@{/categories/delete/{id}(id=${category.id})}" th:onclick="'return confirm(\'' + #{category.delete.confirm} + '\')'"
                   class="inline-flex items-center gap-1.5 rounded-md border border-red-200 px-4 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50">
                    <i class="fas fa-trash"></i><span th:text="#{action.delete}">Delete</span>
                </a>
            </div>
        </footer>
    </article>
</div>
</body>
</html>
