tasks.register('copyHelp', Copy) {
	from 'HELP.md'
	into deployDir
}

tasks.register('copyRun', Copy) {
	from 'run.sh', 'stop.sh'
	into deployDir
}

tasks.register('makeExecutable', Exec) {
	dependsOn 'copyRun'
	commandLine 'bash', '-c', "chmod +x ${deployDir}/run.sh ${deployDir}/stop.sh"
}

tasks.register('stopApp', Exec) {
	dependsOn 'copyFiles', 'copyHelp', 'makeExecutable'
	commandLine 'bash', '-c',
		"PID_FILE=${deployDir}/smbox.pid; " +
		"if [ -f \"\$PID_FILE\" ]; then " +
		"  PID=\$(cat \"\$PID_FILE\"); " +
		"  if kill -0 \"\$PID\" 2>/dev/null; then " +
		"    echo \"Stopping smbox (PID \$PID)...\"; " +
		"    kill \"\$PID\" && sleep 2; " +
		"  fi; " +
		"  rm -f \"\$PID_FILE\"; " +
		"else " +
		"  echo 'smbox is not running.'; " +
		"fi"
}

tasks.register('startApp', Exec) {
	dependsOn 'stopApp'
	workingDir deployDir
	commandLine 'bash', '-c',
		"nohup java -jar ${deployDir}/smbox.jar > ${deployDir}/smbox.log 2>&1 & " +
		"echo \$! > ${deployDir}/smbox.pid; " +
		"echo \"smbox started (PID \$(cat ${deployDir}/smbox.pid))\""
}

tasks.register('deploy') {
	dependsOn 'startApp'
}
